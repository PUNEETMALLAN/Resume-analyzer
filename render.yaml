services:
  - type: web
    name: resume-analyzer
    env: node
    branch: main
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    plan: free
    autoDeploy: true
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: GROQ_API_KEY
        sync: false

run: |
  curl --request POST \
    --url https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys \
    --header "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
    --data '{}'
